<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body style="text-align: center; font-family: Kantumruy Pro; background: #05ed43; ">
    <Form style="background-color: deeppink;">
        <label for="txtFirstname">First name</label><br>  
        <!-- Lableគឺជាtabម្យ៉ាងប្រើសម្រាប់ដាក់អក្សរនៅខាងឆ្វេង -->
         <input type="text" name="Firstname" id="txtFirstname" placeholder="please input your firstname"><br>
         <!-- placeholder គឺជាការសរសេរបញ្ចូលនូវអក្សរមិនច្បាស់នៅក្នុងប្រអប់បញ្ចូលទិន្នន័យ -->

         <label for="txtlastname">Last name</label><br>
         <input type="text" name="lastname" id="txtlastname" placeholder="please input your lastname"><br>
          
         <label for="">Email</label><br>
         <input type="email" name="UserEmail" id="txtemail" placeholder="your email"><br>

         <label for="">Password</label><br>
         <input type="password" name="userpassword" id="txtpassword" placeholder="your password" minlength="8" maxlength="10"><br><br>
         <!-- minleghth គឺជាចំនួនលេខកូដតិចបំផុត​ maxleghth គឺជាចំនួនលេខកូដច្រើនបំផុត​ -->

         <!-- <input type="button" value="Register"> -->

        <button type="submit"; style="font-family: Kantumruy Pro; color: rgb(22, 22, 23); background:#f20707">
            Register
        </button>
        <button type="reset"; style="font-family: kantumruy Pro; background: #f70505;">Clear Data</button>
    </Form>
    
</body>
</html>
